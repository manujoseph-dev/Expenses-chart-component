<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />

  <title>Expenses chart component</title>
  <link rel="stylesheet" href="./css/style.css" />
  
</head>

<body>
  <main>
    <!-- chart container -->
    <div class="container">
      <div class="balance-container">
        <div class="balance">
          <p>My balance</p>
          <p class="my-balance">$921.48</p>
        </div>
        <div class="logo">
          <img src="./images/logo.svg" alt="logo">
        </div>
      </div>
      <div class="card">
        <div class="chart">
          <h2 class="chart-heading">Spending - Last 7 days</h2>
          <!-- <div class="bar-container">
        <span>$57.33</span>
        <div class="bar"></div>
        <label for="monday">mon</label>
      </div> -->
        </div>

        <div class="divide-line"></div>

        <div class="monthly-expenses">
          <div class="total-month">
            <p>Total this month</p>
            <h2 class="total-expenses">$478.33</h2>
          </div>
          <div class="last-month">
            <p>+2.4%</p>
            <p>from last month</p>
          </div>
        </div>

      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/SplitText.min.js"></script>

  <script defer src="./js/animate.js"></script>
  <script defer src="./js/app.js"></script>
 
</body>

</html>
